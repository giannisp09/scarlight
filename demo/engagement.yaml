# Scarlight v1.1 demo — authorization scope for the two-container attack-chain lab.
#
# The engagement guard requires every engagement to have a valid scope file
# declaring authorized targets, an authorization reference, and operator
# acknowledgment of CODE_OF_USE.md. This file is the demo's scope.
#
# Targets:
#   1. web-target   — Flask app with intentional command injection on /ping.
#                     Bound to 127.0.0.1:8080 by demo/docker-compose.yml.
#   2. pivot-target — alpine + sshd. The lateral-movement target — reachable
#                     once the agent steals /root/.ssh/id_rsa from web-target.
#                     Bound to 127.0.0.1:2222.
#
# Reachable from inside the Kali sandbox at host.docker.internal:{8080,2222}.

engagement_id: "scarlight-demo-chain"

authorization_reference: >
  Scarlight v1.1 demo. Two-container Linux lab: a Flask web app with
  intentional command injection (web-target) and an SSH pivot host
  (pivot-target). Both built from this repo's demo/lab/ Dockerfiles and run
  locally in Docker on the operator's machine, bound to host loopback only.
  No third party is touched.

operator_acknowledgment:
  acknowledged: true
  operator: "Demo Operator <operator@example.com>"
  date: "2026-05-19"
  code_of_use_version: "1"

targets:
  # web-target — initial-access host
  - "host.docker.internal"
  - "host.docker.internal:8080"
  - "http://host.docker.internal:8080"
  - "http://host.docker.internal:8080/"
  - "127.0.0.1"
  - "127.0.0.1:8080"
  - "localhost"
  - "localhost:8080"
  # pivot-target — lateral-movement host
  - "host.docker.internal:2222"
  - "ssh://host.docker.internal:2222"
  - "127.0.0.1:2222"
  - "localhost:2222"

window:
  start: "2026-05-19T00:00:00Z"
  end:   "2027-05-19T23:59:59Z"

notes: |
  Lab containers: scarlight-demo-web-target (port 8080) and
  scarlight-demo-pivot (port 2222), brought up by demo/start-lab.sh and
  torn down by demo/stop-lab.sh.

  Trophy: /root/flag.txt on pivot-target. Cleartext content is
  SCARLIGHT{l4t3r4l_m0v3m3nt_w1th_4uth0r1z4t10n_v1_1} — not a secret, used
  as the engagement's success signal.
